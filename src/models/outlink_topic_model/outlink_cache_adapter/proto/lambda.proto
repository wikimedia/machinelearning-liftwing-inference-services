syntax = "proto3";

package lambda;

option go_package = "./proto";

service LambdaService {
  rpc GetArtifact(LambdaRequest) returns (LambdaResponse);
}

message LambdaRequest {
  string wiki = 1;
  int64 page = 2;
  int64 revision = 3;
}

message LambdaResponse {
  bytes content = 1;
  map<string, string> metadata = 2;
}
