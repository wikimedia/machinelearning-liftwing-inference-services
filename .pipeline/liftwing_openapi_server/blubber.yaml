# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.1.0
version: v4
base: docker-registry.wikimedia.org/httpd:2.4.67-1-20260531
runs:
  insecurely: false

lives:
  in: /srv/app

variants:
  production:
    copies:
      - from: local
        source: docs
        destination: docs
      - from: local
        source: src/models/liftwing_openapi_server/httpd.conf
        destination: apache2.conf
      - from: local
        source: src/models/liftwing_openapi_server/liftwingspec.conf
        destination: liftwingspec.conf
      - from: local
        source: src/models/liftwing_openapi_server/entrypoint.sh
        destination: entrypoint.sh
    entrypoint: ["./entrypoint.sh"]
