# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.0.1
version: v4
base: docker-registry.wikimedia.org/bookworm:20260531

lives:
  in: /srv/app

variants:
  production:
    copies:
      - from: local
        source: src/models/liftwing_openapi_server/.
        destination: .
    python:
      version: python3
      use-system-site-packages: true
      no-deps: false
    entrypoint: ["python3", "-c", "print('stub')"]
    # work around to fix: https://gerrit.wikimedia.org/r/c/machinelearning/liftwing/inference-services/+/1296942/comments/f3795845_4c622135
