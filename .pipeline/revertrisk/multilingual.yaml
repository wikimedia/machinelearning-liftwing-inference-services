# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.0.1
version: v4
base: docker-registry.wikimedia.org/amd-pytorch25:2.5.1rocm6.1-1
runs:
  insecurely: true
  environment:
    PYTHONPATH: /opt/lib/venv/lib/python3.11/site-packages:/srv/revert_risk_model:/opt/lib/python/site-packages

lives:
  in: /srv/revert_risk_model

variants:
  build:
    python:
      version: python3
      requirements: ["src/models/revert_risk_model/model_server/multilingual/requirements.txt", "python/requirements.txt"]
    apt:
      packages:
        - build-essential
        - python3-pip
        - python3-dev
        - python3-setuptools
        - python3.11-venv
        - git

  production:
    copies:
      - from: local
        source: src/models/revert_risk_model/data
        destination: data
      - from: local
        source: src/models/revert_risk_model/model_server
        destination: model_server
      - from: local
        source: python
        destination: python/
      - from: build
        source: /opt/lib/python/site-packages
        destination: /opt/lib/python/site-packages
      - from: build
        source: /opt/lib/venv/lib/python3.11/site-packages/
        destination: /opt/lib/venv/lib/python3.11/site-packages/
      - from: local
        source: model_server_entrypoint.sh
        destination: entrypoint.sh
      - from: local
        source: common_settings.sh
        destination: common_settings.sh
    apt:
      packages:
        - python3
        - python3-distutils
        - wmf-certificates
        - python3-setuptools
        - libdrm-amdgpu1
        - python3.11-venv
    python:
      version: python3
      use-system-site-packages: true
    entrypoint: ["./entrypoint.sh"]
