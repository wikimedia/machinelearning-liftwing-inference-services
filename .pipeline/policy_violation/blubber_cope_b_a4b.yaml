# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.0.1
version: v4
base: docker-registry.wikimedia.org/ml/amd-vllm022:gfx90agfx942rocm7.2.0pytorch2.10.0flash-attn2.8.3aiter0.1.13vllm0.22.1-2
runs:
  insecurely: true
  environment:
    PYTHONPATH: /srv/venv/lib/python3.12/site-packages:/srv/app
    PATH: $PATH:/srv/app

lives:
  in: /srv/app

variants:
  build:
    apt:
      packages:
        - build-essential
        - cmake
        - git
        - pkg-config
    builders:
      - custom:
          # fix issue where blubber's default python builder is not using the correct python version (3.12) and venv path
          requirements: [src/models/policy_violation/cope_b_a4b/requirements.txt]
          command: [ "/srv/venv/bin/python", "-m", "pip", "install", "-r", "src/models/policy_violation/cope_b_a4b/requirements.txt" ]
      - custom:
          # fix issue where blubber's default python builder is not using the correct python version (3.12) and venv path
          requirements: [python/requirements.txt]
          command: [ "/srv/venv/bin/python", "-m", "pip", "install", "-r", "python/requirements.txt" ]


  production:
    copies:
      - from: local
        source: src/models/policy_violation/cope_b_a4b/.
        destination: .
      - from: local
        source: python
        destination: python
      - from: build
        source: /srv/venv/lib/python3.12/site-packages
        destination: /srv/venv/lib/python3.12/site-packages
      - from: local
        source: model_server_entrypoint_python312.sh
        destination: entrypoint.sh
      - from: local
        source: common_settings_python312.sh
        destination: common_settings.sh

    apt:
      packages:
        - wmf-certificates
        - libdrm-amdgpu1
        - g++
    entrypoint: ["./entrypoint.sh", "model.py"]
