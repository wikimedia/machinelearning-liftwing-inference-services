# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.0.1
version: v4
base: docker-registry.wikimedia.org/ml/amd-vllm022:gfx90agfx942rocm7.2.0pytorch2.10.0flash-attn2.8.3aiter0.1.13vllm0.22.1
runs:
  insecurely: true
  environment:
    PYTHONPATH: /srv/venv/lib/python3.12/site-packages:/srv/app
    PATH: $PATH:/srv/app
    # Overwrite proxy variables with empty strings
    http_proxy:
    https_proxy:
    no_proxy:

lives:
  in: /srv/app

variants:
  build:
    python:
      version: python3
      requirements: [src/models/policy_violation/cope_b_a4b/requirements.txt, python/requirements.txt]
      use-system-site-packages: true
      no-deps: false
    apt:
      packages:
        - build-essential
        - cmake
        - git
        - pkg-config


  production:
    copies:
      - from: local
        source: src/models/policy_violation/cope_b_a4b/.
        destination: .
      - from: local
        source: python
        destination: python
      - from: build
        source: /srv/venv/lib/python3.12/site-packages
        destination: /srv/venv/lib/python3.12/site-packages

    apt:
      packages:
        - wmf-certificates
        - libdrm-amdgpu1
        - g++
    python:
      version: python3
      use-system-site-packages: true
      no-deps: false
    entrypoint: ["./entrypoint.sh", "model.py"]
