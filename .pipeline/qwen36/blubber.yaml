# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.0.1
version: v4
base: docker-registry.wikimedia.org/ml/amd-vllm022:gfx90agfx942rocm7.2.0pytorch2.10.0flash-attn2.8.3aiter0.1.13vllm0.22.1-2
runs:
  insecurely: true
  environment:
    # production (amd-vllm022) installs into the base image's py3.12 venv at
    # /srv/venv; the bookworm test variant installs into blubber's py3.11 venv
    # at /opt/lib/venv. Both are listed so each variant finds its packages.
    PYTHONPATH: /srv/venv/lib/python3.12/site-packages:/opt/lib/venv/lib/python3.11/site-packages:/srv/app
    PATH: $PATH:/srv/app
    # Overwrite proxy variables with empty strings
    http_proxy:
    https_proxy:
    no_proxy:

lives:
  in: /srv/app

variants:
  build:
    builders:
      - custom:
          # fix issue where blubber's default python builder is not using the correct python version (3.12) and venv path
          requirements: [src/models/qwen36/requirements.txt]
          command: ["/srv/venv/bin/python", "-m", "pip", "install", "-r", "src/models/qwen36/requirements.txt"]
      - custom:
          # fix issue where blubber's default python builder is not using the correct python version (3.12) and venv path
          requirements: [python/requirements.txt]
          command: ["/srv/venv/bin/python", "-m", "pip", "install", "-r", "python/requirements.txt"]

    apt:
      packages:
        - build-essential
        - cmake
        - git
        - pkg-config


  production:
    copies:
      - from: local
        source: src/models/qwen36/model_server/.
        destination: .
      - from: local
        source: python
        destination: python
      - from: build
        source: /srv/venv/lib/python3.12/site-packages
        destination: /srv/venv/lib/python3.12/site-packages
      - from: local
        source: model_server_entrypoint_python312.sh
        destination: entrypoint.sh
      - from: local
        source: common_settings_python312.sh
        destination: common_settings.sh

    apt:
      packages:
        - wmf-certificates
        - libdrm-amdgpu1
        - g++
    python:
      version: python3
      use-system-site-packages: true
      no-deps: false
    entrypoint: ["./entrypoint.sh", "model.py"]

  test:
    base: docker-registry.wikimedia.org/bookworm:20260510
    apt:
      packages:
        - git
        - python3
        - python3-pip
        - python3-venv
    copies:
      - from: local
        source: src/models/qwen36/model_server/.
        destination: src/models/qwen36/model_server/
      - from: local
        source: python
        destination: python
      - from: local
        source: tox.ini
        destination: .
      - from: local
        source: .pre-commit-config.yaml
        destination: .
      - from: local
        source: ci_entrypoint.sh
        destination: entrypoint.sh
      - from: local
        source: ruff.toml
        destination: .
      - from: local
        source: requirements-test.txt
        destination: .
      - from: local
        source: test/unit/__init__.py
        destination: test/unit/__init__.py
      - from: local
        source: test/unit/qwen36
        destination: test/unit/qwen36
    entrypoint: ["./entrypoint.sh", "ci-lint", "ci-unit"]
    python:
      version: python3
      requirements: [src/models/qwen36/requirements.txt, requirements-test.txt]
