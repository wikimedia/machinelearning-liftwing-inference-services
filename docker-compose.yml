services:
  articlequality:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/articlequality/blubber.yaml
      target: production
    image: articlequality:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "articlequality"
    volumes:
      - ${PATH_TO_ARTICLE_QUALITY_MODEL:-/dummy/path}:/mnt/models/
  article-descriptions:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/article_descriptions/blubber.yaml
      target: production
    image: article-descriptions:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "article-descriptions"
    volumes:
      - ${PATH_TO_ARTICLE_DESCRIPTIONS_MODEL:-/dummy/path}:/mnt/models/
  reference-need:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/reference_quality/blubber.yaml
      target: production
    image: ref:prod
    ports:
      - "8080:8080"
    environment:
      BATCH_SIZE: "16"
      MODEL_TO_DEPLOY: "reference-need"
      NUM_OF_WORKERS: 2
    volumes:
      - ${PATH_TO_REFERENCE_NEED_MODEL:-/dummy/path}:/mnt/models/
  reference-risk:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/reference_quality/blubber.yaml
      target: production
    image: ref:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_TO_DEPLOY: "reference-risk"
      NUM_OF_WORKERS: 1
    volumes:
      - ${PATH_TO_REFERENCE_RISK_MODEL:-/dummy/path}:/mnt/models/
  revertrisk-language-agnostic:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/revertrisk/revertrisk.yaml
      target: production
    image: rrla:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "revertrisk-language-agnostic"
    volumes:
      - ${PATH_TO_REVERTRISK_LANGUAGE_AGNOSTIC_MODEL:-/dummy/path}:/mnt/models/
  revertrisk-multilingual:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/revertrisk/multilingual.yaml
      target: production
    image: rrml:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "revertrisk-multilingual"
    volumes:
      - ${PATH_TO_REVERTRISK_MULTILINGUAL_MODEL:-/dummy/path}:/mnt/models/
  edit-check:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/edit_check/blubber.yaml
      target: production
    image: edit-check:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "edit-check"
      MODEL_VERSION: "v1"
    volumes:
      - ${PATH_TO_EDIT_CHECK_MODEL:-/dummy/path}:/mnt/models/
  edit-check-cpu:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/edit_check/blubber_cpu.yaml
      target: production
    image: edit-check:cpu
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "edit-check"
      MODEL_VERSION: "v1"
      ENVIRONMENT: "dev"
      USE_METADATA: "false"
    volumes:
      - ${PATH_TO_EDIT_CHECK_MODEL:-/dummy/path}:/mnt/models/
  edit-check-test:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/edit_check/blubber.yaml
      target: test
    image: edit-check:test
  outlink-topic-model-test:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/outlink/blubber.yaml
      target: test
    image: outlink-topic-model:test
  pre-commit-check:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/pre-commit-check/blubber.yaml
      target: test
    image: pre-commit-check:test
  readability:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/readability/blubber.yaml
      target: production
    image: readability:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "readability"
    volumes:
      - ${PATH_TO_READABILITY_MODEL:-/dummy/path}:/mnt/models/
  outlink-topic-model:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/outlink/blubber.yaml
      target: production
    image: outlink-topic-model:prod
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      MODEL_NAME: "outlink-topic-model"
    volumes:
      - ${PATH_TO_OUTLINK_TOPIC_MODEL:-/dummy/path}:/mnt/models/
  revertrisk-wikidata:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/revertrisk_wikidata/blubber.yaml
      target: production
    image: revertrisk-wikidata:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "revertrisk-wikidata"
    volumes:
      - ${PATH_TO_REVERTRISK_WIKIDATA_MODEL:-/dummy/path}:/mnt/models/
  embeddings:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/embeddings/blubber.yaml
      target: production
    image: embeddings:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "qwen3-embedding"
      MODEL_PATH: "Qwen/Qwen3-Embedding-0.6B"
      DTYPE: "float16"
      TRUST_REMOTE_CODE: "True"
    volumes:
      - ${PATH_TO_EMBEDDINGS_MODEL:-/dummy/path}:/mnt/models/
  labse-embeddings:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/embeddings/blubber.yaml
      target: production
    image: embeddings:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "labse-embedding"
      MODEL_PATH: "sentence-transformers/LaBSE"
      LOCAL_FILES_ONLY: "False"
      DTYPE: "float16"
      ATTN_IMPLEMENTATION: "eager"
    volumes:
      - ${PATH_TO_EMBEDDINGS_MODEL:-/dummy/path}:/mnt/models/
  policy-violation-gpt-oss-safeguard:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/policy_violation/blubber_gpt_oss_safeguard_20b.yaml
      target: production
    image: policy-violation-gpt-oss-safeguard:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "policy-violation"
      MODEL_PATH: "openai/gpt-oss-safeguard-20b"
      TRUST_REMOTE_CODE: "True"
    volumes:
      - ${PATH_TO_POLICY_VIOLATION_MODEL:-/dummy/path}:/mnt/models/
  policy-violation-cope-a-9b:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/policy_violation/blubber_cope_a_9b.yaml
      target: production
    image: policy-violation-cope-a-9b:prod
    ports:
      - "8081:8080"
    environment:
      MODEL_NAME: "cope-a-9b"
      MODEL_PATH: "/mnt/models"
      TRUST_REMOTE_CODE: "True"
    volumes:
      - ${PATH_TO_COPE_A_9B_MODEL:-/dummy/path}:/mnt/models/
  policy-violation-cope-b-a4b:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/policy_violation/blubber_cope_b_a4b.yaml
      target: production
    image: policy-violation-cope-b-a4b:prod
    ports:
      - "8081:8080"
    environment:
      MODEL_NAME: "cope-b-a4b"
      MODEL_PATH: "/mnt/models"
      TRUST_REMOTE_CODE: "True"
    volumes:
      - ${PATH_TO_COPE_B_A4B_MODEL:-/dummy/path}:/mnt/models/
  qwen36-27b-cpu:
    build:
      context: .
      dockerfile: .pipeline/qwen36/blubber_cpu.yaml
      target: production
    image: qwen36-27b:cpu
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "qwen3-0.6b"
      MODEL_PATH: "Qwen/Qwen3-0.6B"
      DTYPE: "auto"
      TRUST_REMOTE_CODE: "True"
      TENSOR_PARALLEL_SIZE: "1"
      MAX_MODEL_LEN: "4096"
      ATTENTION_BACKEND: "CPU_ATTN"
      VLLM_CPU_KVCACHE_SPACE: "8"
      VLLM_CPU_OMP_THREADS_BIND: "nobind"
    volumes:
      - ${PATH_TO_QWEN36_CPU_MODEL:-/dummy/path}:/mnt/models/
    shm_size: 4gb
  enwiki-goodfaith:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/revscoring/blubber.yaml
      target: production
    image: enwiki-goodfaith:prod
    ports:
      - "8080:8080"
    environment:
      INFERENCE_NAME: "enwiki-goodfaith"
      WIKI_URL: "https://en.wikipedia.org"
    volumes:
      - ${PATH_TO_ENWIKI_GOODFAITH_MODEL:-/dummy/path}:/mnt/models/
  editing-suggestions:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/editing_suggestions/blubber.yaml
      target: production
    image: editing-suggestions:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "editing-suggestions"
      MODEL_PATH: "/mnt/models/suggestions.csv"
    volumes:
      - ${PATH_TO_EDITING_SUGGESTIONS_MODEL:-/dummy/path}:/mnt/models/
  liftwing-openapi-server:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/liftwing_openapi_server/blubber.yaml
      target: production
    image: liftwing-openapi-server:prod
    ports:
      - "8081:8080"
  tts:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/tts/blubber.yaml
      target: production
    image: tts:prod
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "tts"
    volumes:
      - ${PATH_TO_TTS_MODEL:-/dummy/path}:/mnt/models/
  tts-section-generator:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .pipeline/tts_section_generator/blubber.yaml
      target: production
    image: tts:prod
    ports:
      - "8080:8080"
