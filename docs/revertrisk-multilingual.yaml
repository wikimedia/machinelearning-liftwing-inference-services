openapi: "3.0.0"
info:
  title: Revert Risk Multilingual — Lift Wing inference service
  version: v1
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/revertrisk-multilingual:predict:
    post:
      summary: Predict revert risk for a Wikipedia revision (multilingual)
      description: |
        Predicts whether a Wikipedia edit is likely to be reverted, using a
        multilingual BERT-based model that runs on GPU. Supports single revision
        and event-based inputs. For more information and for supported languages,
        see the [model card](https://meta.wikimedia.org/wiki/Special:MyLanguage/Machine_learning_models/Production/Multilingual_revert_risk).
      operationId: revertriskMultilingualPredict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rev_id, lang]
              properties:
                rev_id:
                  type: integer
                  description: Wikipedia revision identifier
                  example: 123456789
                lang:
                  type: string
                  description: Language code
                  example: "en"
            example:
              rev_id: 123456789
              lang: "en"
      responses:
        "200":
          description: Successful prediction
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_name:
                    type: string
                    description: Name of the machine learning model
                    example: "revertrisk-multilingual"
                  model_version:
                    type: string
                    description: Version of the machine learning model
                    example: "1.0"
                  wiki_db:
                    type: string
                    description: Wiki database name
                    example: "enwiki"
                  revision_id:
                    type: integer
                    description: Revision identifier
                    example: 123456789
                  output:
                    type: object
                    properties:
                      prediction:
                        type: boolean
                        description: Whether the edit is likely to be reverted
                        example: false
                      probabilities:
                        type: object
                        properties:
                          "true":
                            type: number
                            format: float
                            description: Probability of revert
                            example: 0.20824493352400839
                          "false":
                            type: number
                            format: float
                            description: Probability of not revert
                            example: 0.7917550664759916
              example:
                model_name: "revertrisk-multilingual"
                model_version: "1.0"
                wiki_db: "enwiki"
                revision_id: 123456789
                output:
                  prediction: false
                  probabilities:
                    "true": 0.20824493352400839
                    "false": 0.7917550664759916
        "400":
          description: Invalid input
