openapi: "3.0.0"
info:
  title: Revert Risk Multilingual — Lift Wing inference service
  description: |
    Predicts whether a Wikipedia edit is likely to be reverted, using a
    multilingual BERT-based model that runs on GPU. Supports single revision
    and event-based inputs.
  version: "1.0"
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/revertrisk-multilingual:predict:
    post:
      summary: Predict revert risk for a Wikipedia revision (multilingual)
      operationId: revertriskMultilingualPredict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rev_id, lang]
              properties:
                rev_id:
                  type: integer
                  description: Wikipedia revision ID.
                  example: 123456789
                lang:
                  type: string
                  description: ISO language code (e.g. "en").
                  example: "en"
            example:
              rev_id: 123456789
              lang: "en"
      responses:
        "200":
          description: Successful prediction.
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_name:
                    type: string
                    example: "revertrisk-multilingual"
                  model_version:
                    type: string
                    example: "1.0"
                  wiki_db:
                    type: string
                    example: "enwiki"
                  revision_id:
                    type: integer
                    example: 123456789
                  output:
                    type: object
                    properties:
                      prediction:
                        type: boolean
                        description: "`true` if the edit is likely to be reverted."
                        example: false
                      probabilities:
                        type: object
                        properties:
                          "true":
                            type: number
                            format: float
                            description: Probability of revert.
                            example: 0.08
                          "false":
                            type: number
                            format: float
                            description: Probability of not revert.
                            example: 0.92
              example:
                model_name: "revertrisk-multilingual"
                model_version: "1.0"
                wiki_db: "enwiki"
                revision_id: 123456789
                output:
                  prediction: false
                  probabilities:
                    "true": 0.08
                    "false": 0.92
        "400":
          description: Invalid input.
