openapi: "3.0.0"
info:
  title: Reference Need — Lift Wing inference service
  description: |
    Predicts whether a Wikipedia edit is likely to need a reference. Given a
    revision ID and language, it scores how likely it is that the edit adds
    content requiring a citation.
  version: "1.0"
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/reference-need:predict:
    post:
      summary: Predict reference need for a Wikipedia revision
      operationId: referenceNeedPredict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rev_id, lang]
              properties:
                rev_id:
                  type: integer
                  description: Wikipedia revision ID.
                  example: 123456789
                lang:
                  type: string
                  description: ISO language code (e.g. "en").
                  example: "en"
            example:
              rev_id: 123456789
              lang: "en"
      responses:
        "200":
          description: Successful prediction.
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_name:
                    type: string
                    example: "reference-need"
                  model_version:
                    type: string
                    example: "1.0"
                  wiki_db:
                    type: string
                    example: "enwiki"
                  revision_id:
                    type: integer
                    example: 123456789
                  reference_need_score:
                    type: number
                    format: float
                    description: Score indicating how likely the edit needs a reference (0.0–1.0).
                    example: 0.72
              example:
                model_name: "reference-need"
                model_version: "1.0"
                wiki_db: "enwiki"
                revision_id: 123456789
                reference_need_score: 0.72
        "400":
          description: Invalid input.
