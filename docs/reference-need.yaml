openapi: "3.0.0"
info:
  title: Reference Need — Lift Wing inference service
  version: v1
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/reference-need:predict:
    post:
      summary: Predict missing references in a Wikipedia revision
      description: |
        Predicts whether a Wikipedia edit is likely to need a reference. Given a
        revision ID and language, it scores how likely it is that the edit adds
        content requiring a citation. For more information and for language support,
        see the [model card](https://meta.wikimedia.org/wiki/Special:MyLanguage/Machine_learning_models/Production/Multilingual_reference_need).
      operationId: referenceNeedPredict
      tags:
        - Revision quality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rev_id, lang]
              properties:
                rev_id:
                  type: integer
                  description: Wikipedia revision identifier
                  example: 123456789
                lang:
                  type: string
                  description: Language code
                  example: "en"
            example:
              rev_id: 123456789
              lang: "en"
      responses:
        "200":
          description: Successful prediction
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_name:
                    type: string
                    description: Name of the machine learning model
                    example: "reference-need"
                  model_version:
                    type: string
                    description: Version of the machine learning model
                    example: "1.0"
                  wiki_db:
                    type: string
                    description: Wiki database name
                    example: "enwiki"
                  revision_id:
                    type: integer
                    description: Revision identifier
                    example: 123456789
                  reference_need_score:
                    type: number
                    format: float
                    description: Score indicating how likely the edit needs a reference
                    example: 0.9230769230769231
                    minimum: 0.0
                    maximum: 1.0
              example:
                model_name: "reference-need"
                model_version: v1
                wiki_db: "enwiki"
                revision_id: 123456789
                reference_need_score: 0.9230769230769231
        "400":
          description: Invalid input
