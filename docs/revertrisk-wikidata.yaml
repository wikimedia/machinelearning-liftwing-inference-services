openapi: "3.0.0"
info:
  title: Revert Risk Wikidata — Lift Wing inference service
  version: v1
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/revertrisk-wikidata:predict:
    post:
      summary: Predict revert risk for a Wikidata revision
      description: |
        Predicts whether a Wikidata edit is likely to be reverted. Uses a BERT
        model to score revision diff text combined with a CatBoost classifier
        over metadata features (user age, bot status, page age, etc.). For more
        information, see the [model card](https://meta.wikimedia.org/wiki/Special:MyLanguage/Machine_learning_models/Production/RevertRisk_Wikidata).
      operationId: revertriskWikidataPredict
      tags:
        - Revision quality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rev_id]
              properties:
                rev_id:
                  type: integer
                  description: Wikidata revision identifier
                  example: 1799693453
            example:
              rev_id: 1799693453
      responses:
        "200":
          description: Successful prediction
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_name:
                    type: string
                    description: Name of the machine learning model
                    example: "revertrisk-wikidata"
                  model_version:
                    type: string
                    description: Version of the machine learning model
                    example: "2"
                  revision_id:
                    type: integer
                    description: Revision identifier
                    example: 1799693453
                  output:
                    type: object
                    properties:
                      prediction:
                        type: boolean
                        description: Whether the edit is likely to be reverted
                        example: false
                      probabilities:
                        type: object
                        properties:
                          "true":
                            type: number
                            format: float
                            description: Probability of revert
                            example: 0.3938304642610285
                          "false":
                            type: number
                            format: float
                            description: Probability of not revert
                            example: 0.6061695357389715
              example:
                model_name: "revertrisk-wikidata"
                model_version: v1
                revision_id: 1799693453
                output:
                  prediction: false
                  probabilities:
                    "true": 0.3938304642610285
                    "false": 0.6061695357389715
        "400":
          description: Invalid input
