openapi: "3.1.0"
info:
  title: Readability — Lift Wing inference service
  description: |
    Predicts the readability score of a Wikipedia revision using a BERT-based
    classifier. Returns a readability score and a Flesch–Kincaid grade-level
    proxy.
  version: "1.0"
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/readability:predict:
    post:
      summary: Predict readability of a Wikipedia revision
      operationId: readabilityPredict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rev_id, lang]
              properties:
                rev_id:
                  type: integer
                  description: Wikipedia revision ID.
                  example: 123456789
                lang:
                  type: string
                  description: ISO language code of the Wikipedia (e.g. "en").
                  example: "en"
            example:
              rev_id: 123456789
              lang: "en"
      responses:
        "200":
          description: Successful prediction.
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_name:
                    type: string
                    example: "readability"
                  model_version:
                    type: string
                    example: "1.0"
                  wiki_db:
                    type: string
                    description: Wiki database name.
                    example: "enwiki"
                  revision_id:
                    type: integer
                    description: The input revision ID.
                    example: 123456789
                  output:
                    type: object
                    properties:
                      score:
                        type: number
                        format: float
                        description: Readability score (0.0–1.0, higher = more readable).
                        example: 0.75
                      fk_score_proxy:
                        type: number
                        format: float
                        description: Flesch–Kincaid grade-level proxy.
                        example: 12.3
              example:
                model_name: "readability"
                model_version: "1.0"
                wiki_db: "enwiki"
                revision_id: 123456789
                output:
                  score: 0.75
                  fk_score_proxy: 12.3
        "400":
          description: Invalid input (missing lang/rev_id or unsupported language).
