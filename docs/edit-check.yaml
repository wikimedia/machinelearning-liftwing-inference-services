openapi: "3.0.0"
info:
  title: Edit Check — Lift Wing inference service
  version: v1
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/edit-check:predict:
    post:
      summary: Predict issues in writing style
      description: >
        Compares original and modified text and returns a prediction
        indicating whether the edit introduces a tone, neutral point
        of view (NPOV), or weasel-words violation. Multiple instances
        can be sent in a single request. For more information and for
        supported languages, see the [model card](https://meta.wikimedia.org/wiki/Special:MyLanguage/Machine_learning_models/Production/Tone_Check).
      operationId: editCheckPredict
      tags:
        - Revision quality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instances]
              properties:
                instances:
                  type: array
                  description: List of instances to check
                  minItems: 1
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - lang
                      - page_title
                      - check_type
                      - original_text
                      - modified_text
                    properties:
                      lang:
                        type: string
                        description: Language code
                        example: "en"
                      page_title:
                        type: string
                        description: Page title (or intended title for a new page)
                        example: "Albert Einstein"
                      check_type:
                        type: string
                        description: |
                          Type of edit check to perform. Supports these check types:
                          `tone` (peacock language), `npov` (non-neutral point of
                          view), and `weasel` (weasel words).
                        enum: [tone, npov, weasel]
                        example: "tone"
                      original_text:
                        type: string
                        description: Original, unedited text
                        example: "Einstein was a scientist who did things."
                      modified_text:
                        type: string
                        description: Modified, edited text. Must differ from original_text.
                        example: "Einstein was the most brilliant and unparalleled genius who ever lived, revolutionizing physics beyond all measure."
                      return_shap_values:
                        type: boolean
                        description: Whether to return SHAP explanation values
                        default: false
                        example: false
            example:
              instances:
                - lang: "en"
                  page_title: "Albert Einstein"
                  check_type: "tone"
                  original_text: "Einstein was a scientist who did things."
                  modified_text: "Einstein was the most brilliant and unparalleled genius who ever lived, revolutionizing physics beyond all measure."
      responses:
        "200":
          description: Successful prediction
          content:
            text/plain:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Status message (empty string on success)
                    example: ""
                  batchId:
                    type: string
                    description: Unique identifier for the batch request
                    example: "8a82676f-091c-4a1b-a4b1-a0d5a8f94145"
                  predictions:
                    type: array
                    items:
                      type: object
                      properties:
                        check_type:
                          type: string
                          description: Type of edit check
                          enum: [tone, npov, weasel]
                          example: "tone"
                        details:
                          type: object
                          description: Additional details (SHAP values if requested)
                          properties:
                            violations:
                              type: array
                              items:
                                type: array
                              description: Top-3 violating tokens with their SHAP values
                          example: {}
                        language:
                          type: string
                          description: Language code
                          example: "en"
                        model_name:
                          type: string
                          description: Name of the machine learning model
                          example: "edit-check"
                        model_version:
                          type: string
                          description: Version of the machine learning model
                          example: "v1"
                        page_title:
                          type: string
                          description: Page title
                          example: "Albert Einstein"
                        prediction:
                          type: boolean
                          description: Whether a violation is detected
                          example: true
                        probability:
                          type: number
                          format: float
                          description: Confidence score of the prediction
                          example: 0.83
                          minimum: 0.0
                          maximum: 1.0
                        status_code:
                          type: integer
                          description: HTTP status for this instance (200 = success, 400 = malformed)
                          example: 200
              example:
                message: ""
                batchId: "8a82676f-091c-4a1b-a4b1-a0d5a8f94145"
                predictions:
                  - check_type: "tone"
                    details: {}
                    language: "en"
                    model_name: "edit-check"
                    model_version: "v1"
                    page_title: "Albert Einstein"
                    prediction: true
                    probability: 0.83
                    status_code: 200
        "400":
          description: Invalid input (missing or malformed fields)
