openapi: "3.0.0"
info:
  title: Outlink Topic Model — Lift Wing inference service
  version: v1
servers:
  - url: https://api.wikimedia.org
paths:
  /service/lw/inference/v1/models/outlink-topic-model:predict:
    post:
      summary: Predict topics of a Wikipedia article using outlinks
      description: |
        Predicts the topic of a Wikipedia article based on its outgoing links
        (outlinks). Uses a fastText model trained on Wikipedia outlink
        structures. Supports identification by page ID or page title. For more
        information, see the [model card](https://meta.wikimedia.org/wiki/Special:MyLanguage/Machine_learning_models/Production/Language_agnostic_link-based_article_topic).
      operationId: outlinkTopicModelPredict
      tags:
        - Topics and descriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lang:
                  type: string
                  description: Language code. Not needed if wiki_id is provided.
                  example: "en"
                wiki_id:
                  type: string
                  description: Wiki identifier. Used to derive language if lang is not provided.
                  example: "enwiki"
                page_id:
                  type: integer
                  description: Wikipedia numeric page ID. Mutually exclusive with page_title.
                  example: 60520815
                page_title:
                  type: string
                  description: Wikipedia page title. Mutually exclusive with page_id.
                  example: "Albert Einstein"
                threshold:
                  type: number
                  format: float
                  description: Minimum score threshold for returned topics
                  default: 0.5
                  example: 0.5
                debug:
                  type: boolean
                  description: When true, all topics are returned, and threshold is set to 0.0
                  default: false
                  example: false
                revision_id:
                  type: integer
                  description: Fetch outlinks from a specific revision instead of current page
                  example: 123456789
            examples:
              by-page-id:
                summary: By page ID
                value:
                  lang: "en"
                  page_id: 60520815
                  threshold: 0.5
              by-page-title:
                summary: By page title
                value:
                  page_title: "Albert Einstein"
                  wiki_id: "enwiki"
                  threshold: 0.5
      responses:
        "200":
          description: Successful prediction
          content:
            application/json:
              schema:
                type: object
                properties:
                  prediction:
                    type: object
                    properties:
                      article:
                        type: string
                        description: URL to the Wikipedia article
                        example: "https://en.wikipedia.org/wiki/Albert_Einstein"
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            topic:
                              type: string
                              description: Topic label
                              example: "STEM.Physics"
                            score:
                              type: number
                              format: float
                              description: Probability score
                              example: 0.9990700483322144
                              minimum: 0.0
                              maximum: 1.0
              example:
                prediction:
                  article: "https://en.wikipedia.org/wiki/Albert_Einstein"
                  results:
                    - topic: "STEM.Physics"
                      score: 0.9990700483322144
                    - topic: "Culture.Biography.Biography*"
                      score: 0.8267217874526978
        "400":
          description: Invalid input
